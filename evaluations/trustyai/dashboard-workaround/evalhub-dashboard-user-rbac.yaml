apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: evalhub-dashboard-user
  namespace: my-first-model
rules:
  - apiGroups:
      - trustyai.opendatahub.io
    resources:
      - evaluations
      - collections
      - providers
      - status-events
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: evalhub-dashboard-user-admin
  namespace: my-first-model
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: evalhub-dashboard-user
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: admin
