apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apollo-rollout-promoter
  namespace: apollo-canary
rules:
- apiGroups:
  - argoproj.io
  resources:
  - rollouts
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - argoproj.io
  resources:
  - rollouts/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - argoproj.io
  resources:
  - analysisruns
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apollo-dev-pipeline-rollout-promoter
  namespace: apollo-canary
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apollo-rollout-promoter
subjects:
- kind: ServiceAccount
  name: pipeline
  namespace: apollo-dev
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: promote-apollo-rollout-next-step
  namespace: apollo-dev
spec:
  params:
  - name: rollout-namespace
    type: string
    default: apollo-canary
  - name: rollout-name
    type: string
    default: apollo-console-rollout
  - name: promotion-mode
    type: string
    default: next-step
  results:
  - name: promotion-mode
  steps:
  - name: validate-mode
    image: quay.io/openshift/origin-cli:4.16
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      if [ "$(params.promotion-mode)" != "next-step" ]; then
        echo "ERROR: Only promotion-mode=next-step is supported for the participant lab."
        exit 1
      fi
      printf "%s" "$(params.promotion-mode)" > "$(results.promotion-mode.path)"
  - name: promote-rollout
    image: quay.io/argoproj/kubectl-argo-rollouts:v1.7.2
    args:
    - promote
    - $(params.rollout-name)
    - -n
    - $(params.rollout-namespace)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: record-apollo-canary-route-split
  namespace: apollo-dev
spec:
  params:
  - name: route-namespace
    type: string
    default: apollo-canary
  - name: route-name
    type: string
    default: apollo-console-canary
  - name: rollout-name
    type: string
    default: apollo-console-rollout
  results:
  - name: stable-weight
  - name: candidate-weight
  - name: rollout-phase
  - name: current-step-index
  steps:
  - name: record-route
    image: quay.io/openshift/origin-cli:4.16
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      NS="$(params.route-namespace)"
      ROUTE="$(params.route-name)"
      ROLLOUT="$(params.rollout-name)"

      echo "Waiting for Argo Rollouts to reconcile route..."
      sleep 35

      PHASE="$(oc get rollouts.argoproj.io "${ROLLOUT}" -n "${NS}" -o jsonpath='{.status.phase}' 2>/dev/null || true)"
      STEP="$(oc get rollouts.argoproj.io "${ROLLOUT}" -n "${NS}" -o jsonpath='{.status.currentStepIndex}' 2>/dev/null || true)"
      STABLE_WEIGHT="$(oc get route "${ROUTE}" -n "${NS}" -o jsonpath='{.spec.to.weight}')"
      CANDIDATE_WEIGHT="$(oc get route "${ROUTE}" -n "${NS}" -o jsonpath='{.spec.alternateBackends[0].weight}')"

      echo "stable=${STABLE_WEIGHT}"
      echo "candidate=${CANDIDATE_WEIGHT}"
      echo "phase=${PHASE}"
      echo "currentStepIndex=${STEP}"

      printf "%s" "${STABLE_WEIGHT}" > "$(results.stable-weight.path)"
      printf "%s" "${CANDIDATE_WEIGHT}" > "$(results.candidate-weight.path)"
      printf "%s" "${PHASE}" > "$(results.rollout-phase.path)"
      printf "%s" "${STEP}" > "$(results.current-step-index.path)"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: apollo-canary-promotion
  namespace: apollo-dev
  labels:
    app.kubernetes.io/part-of: apollo-agent-lifecycle
spec:
  params:
  - name: promotion-mode
    type: string
    default: next-step
    description: Use next-step to promote the Argo Rollout to the next canary step.
  tasks:
  - name: promote-rollout
    taskRef:
      name: promote-apollo-rollout-next-step
    params:
    - name: promotion-mode
      value: $(params.promotion-mode)
  - name: record-route-split
    runAfter:
    - promote-rollout
    taskRef:
      name: record-apollo-canary-route-split
  results:
  - name: stable-weight
    value: $(tasks.record-route-split.results.stable-weight)
  - name: candidate-weight
    value: $(tasks.record-route-split.results.candidate-weight)
  - name: rollout-phase
    value: $(tasks.record-route-split.results.rollout-phase)
  - name: current-step-index
    value: $(tasks.record-route-split.results.current-step-index)
