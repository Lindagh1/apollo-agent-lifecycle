apiVersion: apps/v1
kind: Deployment
metadata:
  name: apollo-console
  namespace: apollo-dev
  labels:
    app.kubernetes.io/name: apollo-console
    app.kubernetes.io/part-of: apollo-agent-lifecycle
spec:
  replicas: 1
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app.kubernetes.io/name: apollo-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apollo-console
        app.kubernetes.io/part-of: apollo-agent-lifecycle
        app.kubernetes.io/component: console
    spec:
      automountServiceAccountToken: false
      containers:
        - name: apollo-console
          image: image-registry.openshift-image-registry.svc:5000/apollo-dev/apollo-console:latest
          imagePullPolicy: Always
          env:
            - name: BOOKING_MCP_URL
              value: http://booking-mcp:8080/mcp

            - name: DISRUPTION_MCP_URL
              value: http://disruption-mcp:8080/mcp

            - name: POLICY_MCP_URL
              value: http://policy-mcp:8080/mcp

            - name: CASE_MANAGEMENT_MCP_URL
              value: http://case-management-mcp:8080/mcp

            - name: MODEL_BASE_URL
              value: http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080

            - name: MODEL_ID
              value: llama-32-3b-instruct

            - name: APOLLO_RELEASE
              value: stable-v1

            - name: APOLLO_RELEASE_CHANNEL
              value: stable-v1

            - name: OTEL_TRACES_SAMPLER
              value: always_on

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://apollo-otel-collector.apollo-tracing.svc.cluster.local:4318/v1/traces
            - name: OTEL_PYTHON_FASTAPI_EXCLUDED_URLS
              value: "/api/health,/metrics"

            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              value: apollo-dev

            - name: OTEL_SERVICE_NAME
              value: apollo-console
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: apollo-console
  namespace: apollo-dev
  labels:
    app.kubernetes.io/name: apollo-console
spec:
  selector:
    app.kubernetes.io/name: apollo-console
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: apollo-console
  namespace: apollo-dev
  labels:
    app.kubernetes.io/name: apollo-console
spec:
  to:
    kind: Service
    name: apollo-console
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
