apiVersion: apps/v1
kind: Deployment
metadata:
  name: apollo-console
  namespace: apollo-dev
  labels:
    app.kubernetes.io/name: apollo-console
    app.kubernetes.io/part-of: apollo-agent-lifecycle
spec:
  replicas: 1
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app.kubernetes.io/name: apollo-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apollo-console
        app.kubernetes.io/part-of: apollo-agent-lifecycle
        app.kubernetes.io/component: console
    spec:
      automountServiceAccountToken: false
      containers:
        - name: apollo-console
          image: image-registry.openshift-image-registry.svc:5000/apollo-dev/apollo-console:latest
          imagePullPolicy: Always
          env:
            - name: POLICY_MCP_URL
              value: http://policy-mcp:8080/mcp
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: apollo-console
  namespace: apollo-dev
  labels:
    app.kubernetes.io/name: apollo-console
spec:
  selector:
    app.kubernetes.io/name: apollo-console
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: apollo-console
  namespace: apollo-dev
  labels:
    app.kubernetes.io/name: apollo-console
spec:
  to:
    kind: Service
    name: apollo-console
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
