apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-mcp
  namespace: apollo-dev
  labels:
    app.kubernetes.io/name: booking-mcp
    app.kubernetes.io/part-of: apollo-agent-lifecycle
spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: booking-mcp

  template:
    metadata:
      labels:
        app.kubernetes.io/name: booking-mcp
        app.kubernetes.io/part-of: apollo-agent-lifecycle
        app.kubernetes.io/component: mcp-server

    spec:
      automountServiceAccountToken: false

      containers:
        - name: booking-mcp
          image: image-registry.openshift-image-registry.svc:5000/apollo-dev/booking-mcp:latest
          imagePullPolicy: Always

          env:
            - name: BOOKING_FILE
              value: /opt/app-root/data/bookings.yaml

          ports:
            - name: http
              containerPort: 8080

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: booking-data
              mountPath: /opt/app-root/data
              readOnly: true

      volumes:
        - name: booking-data
          configMap:
            name: apollo-bookings
---
apiVersion: v1
kind: Service
metadata:
  name: booking-mcp
  namespace: apollo-dev
  labels:
    app.kubernetes.io/name: booking-mcp
    app.kubernetes.io/part-of: apollo-agent-lifecycle
spec:
  selector:
    app.kubernetes.io/name: booking-mcp

  ports:
    - name: http
      port: 8080
      targetPort: http
