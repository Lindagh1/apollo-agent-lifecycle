apiVersion: apollo.example.com/v1
kind: CompensationPolicy

metadata:
  id: FED-WEATHER-GENERAL-2027
  airline: fedora-air
  version: "1.0"
  priority: 10

spec:
  name: General weather disruption policy
  disruptionType: weather
  effectiveFrom: "2027-01-01"
  effectiveTo: "2027-12-31"

  decision:
    recommendedAction: automatic-approval
    maximumAutomaticAmount: 400
    humanReviewRequired: false

  conditions:
    minimumDelayMinutes: 180
    cancelledFlightEligible: true

  explanation: >-
    Standard weather-related compensation requests can be recommended
    for automatic approval when all eligibility requirements are met
    and the amount does not exceed 400 EUR.